<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1E1E2E">

<title>Justificativa do Servidor - JPI</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --primary: #1E1E2E;
  --bg: #eef2f5;
  --card: #ffffff;
  --border: #dcdcdc;
}

* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #1e1e2e;
  margin: 0;
}

/* TOOLBAR ESTILO ANDROID */
.toolbar {
  background: #1e1e2e;
  color: #ffffff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 17px;
  font-weight: 500;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  position: sticky;
  top: 0;
  z-index: 10;
}

.toolbar img {
  width: 36px;
  height: 36px;
}


/* BOTÃO LIMPAR BONITO */
.btn-limpar {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 2px solid #ccc;
  background: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-limpar:active {
  transform: scale(0.97);
  background: #f5f5f5;
}

/* CONTAINER */
.container {
  background: #eef2f5;
  min-height: 100vh;
  max-width: 650px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.hidden { display: none; }

/* CANVAS */
canvas {
  border: 2px dashed #000;
  width: 100%;
  height: 180px;
  background: #fff;
  touch-action: none;
}

/* BOTÃO */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-weight: bold;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  color:#fff;
  font-size:18px;
}

label {
  font-size: 14px;
  font-weight: 600;
  margin-top: 10px;
  display: block;
}

</style>

</head>

<body>

<div class="toolbar">
  <img src="https://i.imgur.com/d4DRK0v.png">
  <span>Justificativa de Servidor</span>
</div>

<div class="container">

<div class="card">
<label>Seu nome</label>
<input id="nome" placeholder="Nome completo">
<label>Possui matrícula?</label>
<select id="temMatricula">
<option value="">Selecione</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>

<label id="txtMatricula" class="hidden">Sua Matrícula</label>
<input id="matricula" placeholder="Matrícula" class="hidden">
<label>Seu Cargo</label>
<input id="cargo" placeholder="Ex: Agente Educacional, Professor.....">
</div>

<div class="card">
<label>Rua</label>
<input id="rua" placeholder="Ex: Travessa Jhonatas Atias">
<label>Número</label>
<input id="numero" placeholder="Ex: 1248">
<label>Bairro</label>
<input id="bairro" placeholder="Ex: Nossa Senhora das Graças">
</div>

<div class="card">
<label>Data de Ausência</label>
<input id="dataAusencia" placeholder="Ex: 01/04/2026">

<label>Motivo da Ausência</label>
<select id="motivo">
<option value="">Selecione</option>
<option>Doença</option>
<option>Atestado Médico</option>
<option>Consulta Médica</option>
<option>Outro</option>
</select>

<input id="outroMotivo" placeholder="Outro motivo" class="hidden">
</div>

<div class="card">
<label>Anexar comprovante?</label>
<select id="temComprovante">
<option value="">Selecione</option>
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<label id="txtComprovante" class="hidden">Selecione uma imagem</label>
<input type="file" id="arquivoComprovante" class="hidden">
</div>

<div class="card">
  <label>Desejar Repor?</label>
<select id="reposicao">
<option value="">Selecione</option>
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<label id="txtDataReposicao" class="hidden">Sugestão de Data(s) para reposição</label>
<input id="dataReposicao" placeholder="Ex: 01/04/2026" class="hidden">
</div>

<div class="card">
<label>Assinatura</label> <br>
<canvas id="canvas"></canvas>
<button class="btn-limpar" onclick="limpar()">
  Refazer assinatura
</button>
</div>

<button class="btn" onclick="enviar()">Gerar Documento</button>

</div>

<div class="overlay" id="overlay">Gerando documento...</div>

<script>
// UX
temMatricula.onchange = () => {
  matricula.classList.toggle("hidden", temMatricula.value !== "sim");
  txtMatricula.classList.toggle("hidden", temMatricula.value !== "sim");
}

motivo.onchange = () =>
  outroMotivo.classList.toggle("hidden", motivo.value !== "Outro");

temComprovante.onchange = () => {
  arquivoComprovante.classList.toggle("hidden", temComprovante.value !== "sim");
  txtComprovante.classList.toggle("hidden", temComprovante.value !== "sim");
}

reposicao.onchange = () => {
  dataReposicao.classList.toggle("hidden", reposicao.value !== "sim");
  txtDataReposicao.classList.toggle("hidden", reposicao.value !== "sim");
}
// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(ratio, ratio);

  desenharLinha();
}

function desenharLinha() {
  ctx.beginPath();
  ctx.moveTo(20, 140);
  ctx.lineTo(canvas.offsetWidth - 20, 140);
  ctx.lineWidth = 2;
  ctx.stroke();
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let desenhando = false;

function pos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
    y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
  };
}

// MOUSE
canvas.addEventListener("mousedown", e => {
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
});

canvas.addEventListener("mousemove", e => {
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});

canvas.addEventListener("mouseup", () => desenhando = false);

// TOUCH (🔥 corrigido)
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
}, { passive:false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive:false });

canvas.addEventListener("touchend", () => desenhando = false);

function limpar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  desenharLinha();
}

function getAssinatura(){
  return canvas.toDataURL("image/png");
}

// VALIDAÇÃO COMPLETA
function validar(){

  if(!nome.value || !cargo.value || !rua.value || !numero.value || !bairro.value || !dataAusencia.value || !motivo.value){
    alert("Preencha todos os campos obrigatórios");
    return false;
  }

  if(motivo.value === "Outro" && !outroMotivo.value){
    alert("Descreva o motivo");
    return false;
  }

  if(reposicao.value === "sim" && !dataReposicao.value){
    alert("Informe a data de reposição");
    return false;
  }

  if(temMatricula.value === "sim" && !matricula.value){
    alert("Informe a matrícula");
    return false;
  }

  return true;
}

// ENVIO 
async function enviar(){

  if(!validar()) return;

  overlay.style.display = "flex";

  try {

    let comprovanteBase64 = "";

    if (temComprovante.value === "sim" && arquivoComprovante.files[0]) {
      const file = arquivoComprovante.files[0];

      comprovanteBase64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    const dados = {
      nome: nome.value,
      cargo: cargo.value,
      rua: rua.value,
      numero: numero.value,
      bairro: bairro.value,
      dataAusencia: dataAusencia.value,
      motivo: motivo.value === "Outro" ? outroMotivo.value : motivo.value,
      reposicao: reposicao.value,
      dataReposicao: dataReposicao.value,
      matricula: matricula.value,
      assinatura: getAssinatura(),
      comprovante: comprovanteBase64
    };

    const res = await fetch("https://script.google.com/macros/s/AKfycbxXW7IxoyNlpo5ib-tEDUF7nueidUNr8ocja08xhlK-_Pqq7TBbCuiz1NmbqJmmaOl4kg/exec", {
      method: "POST",
      body: new URLSearchParams({
        data: JSON.stringify(dados)
      })
    });

    const json = await res.json();

    if (json.status === "ok") {
      window.open(json.url);
    } else {
      alert("Erro: " + json.mensagem);
    }

  } catch (e) {
    console.error(e);
    alert("Erro ao enviar");
  }

  overlay.style.display = "none";
}

// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
