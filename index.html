<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Justificativa</title>

<style>
:root {
  --primary: #2e7d32;
  --bg: #eef2f5;
  --card: #ffffff;
  --border: #dcdcdc;
  --text: #2b2b2b;
}

* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 15px;
  color: var(--text);
}

.container {
  max-width: 650px;
  margin: auto;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.header img { width: 50px; }

.card {
  background: var(--card);
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.06);
  margin-bottom: 15px;
}

label {
  font-size: 15px;
  font-weight: 600;
  margin-top: 10px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 13px;
}

.hidden { display: none; }

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

@media (min-width: 600px) {
  .grid { grid-template-columns: 1fr 1fr; }
  .full { grid-column: span 2; }
}

canvas {
  border: 2px dashed #000;
  width: 100%;
  height: 180px;
  border-radius: 8px;
  background: #fff;
  touch-action: none;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.loading {
  text-align: center;
  display: none;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">
    <img src="https://i.imgur.com/d4DRK0v.png">
    <h2>Justificativa de Servidor</h2>
  </div>

  <div class="card">
    <label>Seu Nome</label>
    <input id="nome">

    <label>Possui matrícula?</label>
    <select id="temMatricula">
      <option value="">Selecione</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>

    <input id="matricula" placeholder="Matrícula" class="hidden">

    <label>Seu Cargo</label>
    <input id="cargo">
  </div>

  <div class="card grid">
    <input id="rua" placeholder="Rua">
    <input id="numero" placeholder="Número">
    <input id="bairro" placeholder="Bairro" class="full">
  </div>

  <div class="card">
    <input id="dataAusencia" placeholder="Data(s) de ausência">

    <select id="motivo">
      <option value="">Motivo</option>
      <option>Doença</option>
      <option>Atestado Médico</option>
      <option>Consulta Médica</option>
      <option>Outro</option>
    </select>

    <input id="outroMotivo" placeholder="Descreva o motivo" class="hidden">
  </div>

  <div class="card">
    <select id="temComprovante">
      <option value="">Anexar comprovante?</option>
      <option value="nao">Não</option>
      <option value="sim">Sim</option>
    </select>

    <input type="file" id="arquivoComprovante" class="hidden">
  </div>

  <div class="card">
    <select id="reposicao">
      <option value="">Deseja repor?</option>
      <option value="nao">Não</option>
      <option value="sim">Sim</option>
    </select>

    <input id="dataReposicao" placeholder="Data reposição" class="hidden">
  </div>

  <div class="card">
    <label>Assinatura</label>
    <canvas id="canvas"></canvas>
    <button class="btn" onclick="limpar()">Limpar</button>
  </div>

  <button class="btn btn-primary" onclick="enviar()">Gerar Documento</button>

  <div class="loading" id="loading">Gerando documento...</div>

</div>

<script>
// UX
temMatricula.onchange = () =>
  matricula.classList.toggle("hidden", temMatricula.value !== "sim");

motivo.onchange = () =>
  outroMotivo.classList.toggle("hidden", motivo.value !== "Outro");

temComprovante.onchange = () =>
  arquivoComprovante.classList.toggle("hidden", temComprovante.value !== "sim");

reposicao.onchange = () =>
  dataReposicao.classList.toggle("hidden", reposicao.value !== "sim");

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(ratio, ratio);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let desenhando = false;

function pos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return { x: e.offsetX, y: e.offsetY };
}

canvas.addEventListener("mousedown", e => {
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
});

canvas.addEventListener("mousemove", e => {
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});

canvas.addEventListener("mouseup", () => desenhando = false);

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive: false });

canvas.addEventListener("touchend", () => desenhando = false);

function limpar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function getAssinatura() {
  return canvas.toDataURL("image/png");
}

function getArquivoBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

// 🔥 FUNÇÃO FINAL CORRIGIDA
async function enviar() {

  document.getElementById("loading").style.display = "block";

  try {

    let comprovante = null;

    if (arquivoComprovante.files[0]) {
      comprovante = await getArquivoBase64(arquivoComprovante.files[0]);
    }

    const dados = {
      nome: nome.value,
      cargo: cargo.value,
      rua: rua.value,
      numero: numero.value,
      bairro: bairro.value,
      dataAusencia: dataAusencia.value,
      motivo: motivo.value === "Outro" ? outroMotivo.value : motivo.value,
      reposicao: reposicao.value,
      dataReposicao: dataReposicao.value,
      matricula: matricula.value,
      assinatura: getAssinatura(),
      comprovante: comprovante
    };

    const resposta = await fetch("https://script.google.com/macros/s/AKfycby_TfNn_HhK8tjq9dCL_h0Fvsi-HvvtlSkLxNJOKGTtJDeju4NgupihwgLZNnQnOWQg9Q/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(dados)
    });

    const json = await resposta.json();

    if (json.status === "ok") {
      window.open(json.url, "_blank");
    } else {
      alert("Erro: " + json.mensagem);
    }

  } catch (erro) {
    alert("Erro ao enviar dados");
    console.error(erro);
  }

  document.getElementById("loading").style.display = "none";
}
</script>

</body>
</html>
