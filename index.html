<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1E1E2E">

<title>Justificativa</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --primary: #1E1E2E;
  --bg: #eef2f5;
  --card: #ffffff;
  --border: #dcdcdc;
}

* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: var(--bg);
  margin: 0;
}

/* TOOLBAR ESTILO ANDROID */
.toolbar {
  background: #fff;
  color: #222;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 17px;
  font-weight: 500;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  position: sticky;
  top: 0;
  z-index: 10;
}

.toolbar img {
  width: 36px;
  height: 36px;
}


/* BOTÃO LIMPAR BONITO */
.btn-limpar {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 2px solid #ccc;
  background: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-limpar:active {
  transform: scale(0.97);
  background: #f5f5f5;
}

/* CONTAINER */
.container {
  max-width: 650px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.hidden { display: none; }

/* CANVAS */
canvas {
  border: 2px dashed #000;
  width: 100%;
  height: 180px;
  background: #fff;
  touch-action: none;
}

/* BOTÃO */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-weight: bold;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  color:#fff;
  font-size:18px;
}
</style>

</head>

<body>

<div class="toolbar">
  <img src="https://i.imgur.com/d4DRK0v.png">
  <span>Justificativa de Servidor</span>
</div>

<div class="container">

<div class="card">
<input id="nome" placeholder="Nome completo">
<select id="temMatricula">
<option value="">Possui matrícula?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>

<input id="matricula" placeholder="Matrícula" class="hidden">
<input id="cargo" placeholder="Cargo">
</div>

<div class="card">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
</div>

<div class="card">
<input id="dataAusencia" placeholder="Data(s) de ausência">

<select id="motivo">
<option value="">Motivo</option>
<option>Doença</option>
<option>Atestado Médico</option>
<option>Consulta Médica</option>
<option>Outro</option>
</select>

<input id="outroMotivo" placeholder="Outro motivo" class="hidden">
</div>

<div class="card">
<select id="temComprovante">
<option value="">Anexar comprovante?</option>
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<input type="file" id="arquivoComprovante" class="hidden">
</div>

<div class="card">
<select id="reposicao">
<option value="">Reposição?</option>
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<input id="dataReposicao" placeholder="Data reposição" class="hidden">
</div>

<div class="card">
<b>Assinatura</b>
<canvas id="canvas"></canvas>
<button class="btn-limpar" onclick="limpar()">
  Limpar assinatura
</button>
</div>

<button class="btn" onclick="enviar()">Gerar Documento</button>

</div>

<div class="overlay" id="overlay">Gerando documento...</div>

<script>
// UX
temMatricula.onchange = () =>
  matricula.classList.toggle("hidden", temMatricula.value !== "sim");

motivo.onchange = () =>
  outroMotivo.classList.toggle("hidden", motivo.value !== "Outro");

temComprovante.onchange = () =>
  arquivoComprovante.classList.toggle("hidden", temComprovante.value !== "sim");

reposicao.onchange = () =>
  dataReposicao.classList.toggle("hidden", reposicao.value !== "sim");

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(ratio, ratio);

  desenharLinha();
}

function desenharLinha() {
  ctx.beginPath();
  ctx.moveTo(20, 140);
  ctx.lineTo(canvas.offsetWidth - 20, 140);
  ctx.lineWidth = 2;
  ctx.stroke();
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let desenhando = false;

function pos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
    y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
  };
}

// MOUSE
canvas.addEventListener("mousedown", e => {
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
});

canvas.addEventListener("mousemove", e => {
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});

canvas.addEventListener("mouseup", () => desenhando = false);

// TOUCH (🔥 corrigido)
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
}, { passive:false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive:false });

canvas.addEventListener("touchend", () => desenhando = false);

function limpar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  desenharLinha();
}

function getAssinatura(){
  return canvas.toDataURL("image/png");
}

// VALIDAÇÃO COMPLETA
function validar(){

  if(!nome.value || !cargo.value || !rua.value || !numero.value || !bairro.value || !dataAusencia.value || !motivo.value){
    alert("Preencha todos os campos obrigatórios");
    return false;
  }

  if(motivo.value === "Outro" && !outroMotivo.value){
    alert("Descreva o motivo");
    return false;
  }

  if(reposicao.value === "sim" && !dataReposicao.value){
    alert("Informe a data de reposição");
    return false;
  }

  if(temMatricula.value === "sim" && !matricula.value){
    alert("Informe a matrícula");
    return false;
  }

  return true;
}

// ENVIO
async function enviar(){

  if(!validar()) return;

  overlay.style.display="flex";

  try{

    const dados = {
      nome:nome.value,
      cargo:cargo.value,
      rua:rua.value,
      numero:numero.value,
      bairro:bairro.value,
      dataAusencia:dataAusencia.value,
      motivo: motivo.value==="Outro"?outroMotivo.value:motivo.value,
      reposicao:reposicao.value,
      dataReposicao:dataReposicao.value,
      matricula:matricula.value,
      assinatura:getAssinatura()
    };

    const res = await fetch("https://script.google.com/macros/s/AKfycbzpXILtVdVK19DE8EI_MHdrCqlBtLGj_6_ZpXvYifKLByyKD3QIbegsktVhZyxbb9BCig/exec",{
      method:"POST",
      body:new URLSearchParams({data:JSON.stringify(dados)})
    });

    const json = await res.json();

    if(json.status==="ok"){
      window.open(json.url);
    } else {
      alert("Erro: "+json.mensagem);
    }

  }catch(e){
    alert("Erro ao enviar");
  }

  overlay.style.display="none";
}

// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
