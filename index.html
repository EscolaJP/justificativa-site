<!DOCTYPE html>
<html>
<head>

  <!-- viewport normal (GAS ignora às vezes) -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 🔥 FORÇA VIEWPORT NO APPS SCRIPT -->
  <script>
  (function() {
    let meta = document.querySelector("meta[name=viewport]");
    if (!meta) {
      meta = document.createElement("meta");
      meta.name = "viewport";
      document.head.appendChild(meta);
    }
    meta.setAttribute("content",
      "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no");
  })();
  </script>

  <style>
    :root {
      --primary: #2e7d32;
      --bg: #eef2f5;
      --card: #ffffff;
      --border: #dcdcdc;
      --text: #2b2b2b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 15px;
      color: var(--text);
    }

    .container {
      max-width: 650px;
      margin: auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .header img {
      width: 50px;
    }

    .card {
      background: var(--card);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
    }

    .hidden {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 600px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .full {
        grid-column: span 2;
      }
    }

    canvas {
      border: 2px dashed #000;
      width: 100%;
      height: 180px;
      border-radius: 8px;
      background: #fff;
      touch-action: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="https://i.imgur.com/d4DRK0v.png">
    <h2>Justificativa de Servidor</h2>
  </div>

  <div class="card">
    <label>Nome</label>
    <input id="nome">

    <label>Possui matrícula?</label>
    <select id="temMatricula">
      <option value="">Selecione</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>

    <input id="matricula" placeholder="Matrícula" class="hidden">

    <label>Cargo</label>
    <input id="cargo">
  </div>

  <div class="card grid">
    <input id="rua" placeholder="Rua">
    <input id="numero" placeholder="Número">
    <input id="bairro" placeholder="Bairro" class="full">
  </div>

  <div class="card">
    <input id="dataAusencia" placeholder="Data(s) de ausência">

    <select id="motivo">
      <option value="">Motivo</option>
      <option>Doença</option>
      <option>Atestado Médico</option>
      <option>Consulta Médica</option>
      <option>Outro</option>
    </select>

    <input id="outroMotivo" placeholder="Descreva o motivo" class="hidden">
  </div>

  <div class="card">
    <select id="temComprovante">
      <option value="">Anexar comprovante?</option>
      <option value="nao">Não</option>
      <option value="sim">Sim</option>
    </select>

    <input type="file" id="arquivoComprovante" class="hidden">
  </div>

  <div class="card">
    <select id="reposicao">
      <option value="">Deseja repor?</option>
      <option value="nao">Não</option>
      <option value="sim">Sim</option>
    </select>

    <input id="dataReposicao" placeholder="Data reposição" class="hidden">
  </div>

  <div class="card">
    <label>Assinatura</label>
    <canvas id="canvas"></canvas>
    <button class="btn" onclick="limpar()">Limpar</button>
  </div>

  <button class="btn btn-primary" onclick="enviar()">Gerar Documento</button>

</div>

<script>
// 🔥 FORÇA ESCALA MOBILE NO APPS SCRIPT
function forceMobile() {
  const scale = window.innerWidth / 980;
  document.body.style.transform = "scale(" + scale + ")";
  document.body.style.transformOrigin = "top left";
  document.body.style.width = (100 / scale) + "%";
}
forceMobile();
window.addEventListener("resize", forceMobile);

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(ratio, ratio);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// UX
temMatricula.onchange = () =>
  matricula.classList.toggle("hidden", temMatricula.value !== "sim");

motivo.onchange = () =>
  outroMotivo.classList.toggle("hidden", motivo.value !== "Outro");

temComprovante.onchange = () =>
  arquivoComprovante.classList.toggle("hidden", temComprovante.value !== "sim");

reposicao.onchange = () =>
  dataReposicao.classList.toggle("hidden", reposicao.value !== "sim");

// assinatura
let desenhando = false;

function pos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return { x: e.offsetX, y: e.offsetY };
}

canvas.addEventListener("mousedown", e => {
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
});

canvas.addEventListener("mousemove", e => {
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});

canvas.addEventListener("mouseup", () => desenhando = false);

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  desenhando = true;
  ctx.beginPath();
  ctx.moveTo(pos(e).x, pos(e).y);
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!desenhando) return;
  const p = pos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive: false });

canvas.addEventListener("touchend", () => desenhando = false);

function limpar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

<script>
async function enviar() {

  const dados = {
    nome: nome.value,
    cargo: cargo.value,
    rua: rua.value,
    numero: numero.value,
    bairro: bairro.value,
    dataAusencia: dataAusencia.value,
    motivo: motivo.value,
    reposicao: reposicao.value,
    dataReposicao: dataReposicao.value,
    matricula: matricula.value
  };

  const resposta = await fetch("https://script.google.com/macros/s/AKfycbyQi_-PQk20jCWyl7qoy8eCAwMXD-HdawqUKXTbZeRfVNMM0szlKJnbKp3yN0mAnIXmyQ/exec", {
    method: "POST",
    body: JSON.stringify(dados)
  });

  const url = await resposta.text();

  alert("Documento gerado!");
  window.open(url, "_blank");
}
</script>

</body>
</html>
