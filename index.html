<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Justificativa</title>

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<style>
:root {
  --primary: #2e7d32;
  --bg: #eef2f5;
  --card: #ffffff;
  --border: #dcdcdc;
}

body {
  font-family: Arial;
  background: var(--bg);
  margin: 0;
}

/* 🔥 TOOLBAR */
.toolbar {
  background: var(--primary);
  color: #fff;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.container {
  max-width: 650px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.hidden { display: none; }

canvas {
  border: 2px dashed #000;
  width: 100%;
  height: 180px;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-weight: bold;
}

/* 🔥 LOADING FULL SCREEN */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  color:#fff;
  font-size:18px;
}
</style>

</head>

<body>

<div class="toolbar">
  <img src="https://i.imgur.com/d4DRK0v.png" width="40">
  <b>Justificativa de Servidor</b>
</div>

<div class="container">

<div class="card">
<input id="nome" placeholder="Nome completo" required>
<select id="temMatricula" required>
<option value="">Possui matrícula?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>

<input id="matricula" placeholder="Matrícula" class="hidden">

<input id="cargo" placeholder="Cargo" required>
</div>

<div class="card">
<input id="rua" placeholder="Rua" required>
<input id="numero" placeholder="Número" required>
<input id="bairro" placeholder="Bairro" required>
</div>

<div class="card">
<input id="dataAusencia" placeholder="Data(s) de ausência" required>

<select id="motivo" required>
<option value="">Motivo</option>
<option>Doença</option>
<option>Atestado Médico</option>
<option>Consulta Médica</option>
<option>Outro</option>
</select>

<input id="outroMotivo" placeholder="Outro motivo" class="hidden">
</div>

<div class="card">
<select id="temComprovante" required>
<option value="">Anexar comprovante?</option>
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<input type="file" id="arquivoComprovante" class="hidden">
</div>

<div class="card">
<select id="reposicao" required>
<option value="">Reposição?</option>
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<input id="dataReposicao" placeholder="Data reposição" class="hidden">
</div>

<div class="card">
<b>Assinatura</b>
<canvas id="canvas"></canvas>
<button onclick="limpar()">Limpar</button>
</div>

<button class="btn" onclick="enviar()">Gerar Documento</button>

</div>

<!-- 🔥 LOADING -->
<div class="overlay" id="overlay">Gerando documento...</div>

<script>
// UX
temMatricula.onchange = () =>
  matricula.classList.toggle("hidden", temMatricula.value !== "sim");

motivo.onchange = () =>
  outroMotivo.classList.toggle("hidden", motivo.value !== "Outro");

temComprovante.onchange = () =>
  arquivoComprovante.classList.toggle("hidden", temComprovante.value !== "sim");

reposicao.onchange = () =>
  dataReposicao.classList.toggle("hidden", reposicao.value !== "sim");

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.scale(ratio, ratio);
  linha();
}

function linha() {
  ctx.beginPath();
  ctx.moveTo(20,140);
  ctx.lineTo(canvas.width/(window.devicePixelRatio||1)-20,140);
  ctx.stroke();
}

resizeCanvas();

let d=false;

canvas.onmousedown = e => {
  d=true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX,e.offsetY);
};

canvas.onmousemove = e => {
  if(!d) return;
  ctx.lineTo(e.offsetX,e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = ()=> d=false;

function limpar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  linha();
}

function getAssinatura(){
  return canvas.toDataURL();
}

// 🔥 VALIDAÇÃO
function validar(){
  if(!nome.value || !cargo.value || !rua.value || !numero.value || !bairro.value || !dataAusencia.value || !motivo.value){
    alert("Preencha todos os campos");
    return false;
  }
  return true;
}

// 🔥 ENVIO
async function enviar(){

  if(!validar()) return;

  document.getElementById("overlay").style.display="flex";

  try{

    const dados = {
      nome:nome.value,
      cargo:cargo.value,
      rua:rua.value,
      numero:numero.value,
      bairro:bairro.value,
      dataAusencia:dataAusencia.value,
      motivo: motivo.value==="Outro"?outroMotivo.value:motivo.value,
      reposicao:reposicao.value,
      dataReposicao:dataReposicao.value,
      matricula:matricula.value,
      assinatura:getAssinatura()
    };

    const res = await fetch("SEU_WEBAPP_URL_AQUI",{
      method:"POST",
      body:new URLSearchParams({data:JSON.stringify(dados)})
    });

    const json = await res.json();

    if(json.status==="ok"){
      window.open(json.url);
    } else {
      alert("Erro: "+json.mensagem);
    }

  }catch(e){
    alert("Erro ao enviar");
  }

  document.getElementById("overlay").style.display="none";
}

// 🔥 PWA SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
